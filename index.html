    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: Arial, sans-serif; }
        body { background:#f4f7fa; overflow: hidden; }
        .max-w-md { max-width: 480px; margin: 0 auto; position: relative; height: 100vh; }
        .halaman { position: absolute; top: 0; left: 0; width: 100%; height: 100vh; overflow: hidden; z-index: 1; }
        .hilang { display: none !important; }

        /* ✅ LOGO POJOK KIRI ATAS - SEMUA HALAMAN */
        .logo-kiri-atas {
            position: absolute;
            top: 15px;
            left: 15px;
            width: 45px;
            height: auto;
            z-index: 10;
        }

        /* ✅ KODE ANIMASI 3D DARI KAMU */
        .header-3d-wrapper {
            width: 100%;
            height: 340px;
            background: linear-gradient(135deg, #0086e6, #0056b3);
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            position: relative;
            padding: 20px 0;
        }
        .carousel-3d-container {
            width: 300px;
            height: 180px;
            position: relative;
            perspective: 1000px;
        }
        .carousel-3d-spinner {
            width: 100%;
            height: 100%;
            position: absolute;
            transform-style: preserve-3d;
            animation: spin3D 20s infinite linear;
        }
        .carousel-3d-spinner:hover, .carousel-3d-spinner:active {
            animation-play-state: paused;
        }
        .carousel-3d-item {
            position: absolute;
            width: 280px;
            height: 160px;
            left: 10px;
            top: 10px;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.4);
            transition: transform 0.5s ease;
        }
        .carousel-3d-item img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .carousel-3d-item:nth-child(1) { transform: rotateY(0deg) translateZ(250px); }
        .carousel-3d-item:nth-child(2) { transform: rotateY(72deg) translateZ(250px); }
        .carousel-3d-item:nth-child(3) { transform: rotateY(144deg) translateZ(250px); }
        .carousel-3d-item:nth-child(4) { transform: rotateY(216deg) translateZ(250px); }
        .carousel-3d-item:nth-child(5) { transform: rotateY(288deg) translateZ(250px); }
        @keyframes spin3D {
            from { transform: rotateY(0deg); }
            to { transform: rotateY(360deg); }
        }
        @media (max-width: 480px) {
            .header-3d-wrapper { height: 260px; }
            .carousel-3d-container { width: 200px; height: 120px; }
            .carousel-3d-item { width: 190px; height: 110px; }
            .carousel-3d-item:nth-child(1) { transform: rotateY(0deg) translateZ(160px); }
            .carousel-3d-item:nth-child(2) { transform: rotateY(72deg) translateZ(160px); }
            .carousel-3d-item:nth-child(3) { transform: rotateY(144deg) translateZ(160px); }
            .carousel-3d-item:nth-child(4) { transform: rotateY(216deg) translateZ(160px); }
            .carousel-3d-item:nth-child(5) { transform: rotateY(288deg) translateZ(160px); }
        }


        /* ✅ NAVIGASI BAWAH BARU */
        .nav-baru {
            position: absolute;
            bottom: 0;
            width: 100%;
            background-color: #ffffff;
            border-top: 1px solid #eee;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 8px 15px;
            box-sizing: border-box;
            z-index: 5;
        }
        .nav-item {
            text-align: center;
            cursor: pointer;
            flex: 1;
            position: relative;
            z-index: 6;
        }
        .nav-item svg {
            width: 24px;
            height: 24px;
            margin-bottom: 2px;
        }
        .nav-item.aktif { color: #000000; font-weight: bold; }
        .nav-item.non-aktif { color: #999999; }
        .nav-item span { font-size: 12px; display: block; }
        /* TOMBOL PAY TENGAH */
        .nav-pay {
            background: linear-gradient(135deg, #0099ff, #007bff);
            width: 65px;
            height: 65px;
            border-radius: 50%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: bold;
            font-size: 13px;
            box-shadow: 0 3px 10px rgba(0, 134, 230, 0.3);
            margin-top: -20px;
            border: 4px solid white;
        }
        .nav-pay svg { width: 22px; height: 22px; margin-bottom: 1px; }


        /* ====================================== */
        /* ✅ HALAMAN NOMOR */
        /* ====================================== */
        #nomor { 
            background-color: #0086e6; 
            color: white; 
            padding: 40px 25px; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: flex-start; 
        }
        .logo-dana-tengah { width: 80px; margin-bottom: 40px; margin-top: 20px; }
        .judul-nomor { font-size: 17px; margin-bottom: 35px; font-weight: normal; color: white; }
        
        .kotak-input-nomor {
            width: 100%;
            background-color: white;
            border-radius: 12px;
            display: flex;
            align-items: center;
            padding: 12px 15px;
            margin-bottom: 20px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
        .bendera-id { width: 22px; height: 15px; margin-right: 10px; }
        .kode-negara { color: #333; font-weight: bold; margin-right: 8px; font-size: 16px; }
        .input-nomor { flex: 1; border: none; outline: none; font-size: 16px; color: #333; background: transparent; }
        
        .teks-syarat { font-size: 13px; text-align: center; line-height: 1.5; margin-bottom: 60px; color: white; opacity: 0.9; }
        .teks-syarat a { color: white; text-decoration: underline; font-weight: 500; }
        
        .tombol-lanjut-nomor {
            position: absolute;
            bottom: 50px;
            color: white;
            font-size: 17px;
            font-weight: 500;
            background: transparent;
            border: none;
            cursor: pointer;
        }

        /* ✅ ANIMASI LOADING */
        .loading-overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background-color: #0086e6;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 999;
        }
        .logo-loading { width: 70px; position: relative; z-index: 2; }
        .cincin-loading {
            position: absolute;
            width: 90px; height: 90px;
            border: 3px solid transparent;
            border-top: 3px solid white;
            border-radius: 50%;
            animation: putar 1s linear infinite;
            z-index: 1;
        }
        @keyframes putar { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }


        /* ====================================== */
        /* ✅ HALAMAN PIN */
        /* ====================================== */
        #pin { background-color: #0086e6; color: white; padding: 30px 25px; }
        .tombol-kembali { position: absolute; top: 20px; left: 20px; color: white; font-size: 22px; text-decoration: none; z-index: 10; }
        .logo-pin-tengah { width: 70px; display: block; margin: 0 auto 30px auto; margin-top: 15px; }
        .judul-pin { text-align: center; font-size: 17px; margin-bottom: 40px; font-weight: normal; color: white; }
        .kotak-pin-baris { display: flex; justify-content: center; gap: 12px; margin-bottom: 25px; }
        .kotak-pin {
            width: 50px; height: 55px;
            background-color: white;
            border-radius: 8px;
            position: relative;
        }
        .kotak-pin.aktif::after {
            content: '';
            position: absolute;
            left: 50%; top: 12px;
            width: 2px; height: 20px;
            background-color: #999;
            animation: kedip 1s infinite;
        }
        @keyframes kedip { 0%, 100% { opacity: 1; } 50% { opacity: 0; } }
        .tombol-tampilkan {
            display: block;
            margin: 0 auto 30px auto;
            background-color: transparent;
            border: 1px solid white;
            color: white;
            padding: 6px 18px;
            border-radius: 20px;
            font-size: 14px;
        }
        .lupa-pin { text-align: center; font-size: 15px; color: white; opacity: 0.9; margin-bottom: 60px; }
        .ikon-bawah-pin {
            position: absolute;
            bottom: 40px; left: 50%; transform: translateX(-50%);
            width: 50px; height: 50px;
            background-color: white;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .ikon-bawah-pin svg { width: 24px; height: 24px; fill: #0086e6; }

        /* KEYBOARD PIN */
        .keyboard-pin {
            position: absolute;
            bottom: 80px;
            width: 100%;
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            padding: 0 40px;
        }
        .tombol-angka {
            width: 60px; height: 60px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 22px;
            color: white;
            cursor: pointer;
            border: none;
            background: transparent;
            margin: 0 auto;
            position: relative;
            z-index: 5;
        }
        .tombol-angka:active { background-color: rgba(255,255,255,0.15); }


        /* ====================================== */
        /* ✅ HALAMAN OTP */
        /* ====================================== */
        #otp { background-color: white; color: #333; }
        .header-otp { background-color: #0086e6; color: white; padding: 15px 20px; position: relative; text-align: center; font-weight: 500; font-size: 17px; }
        .kembali-otp { position: absolute; left: 15px; top: 50%; transform: translateY(-50%); color: white; font-size: 20px; text-decoration: none; z-index: 10; }
        .isi-otp { padding: 30px 25px; }
        .teks-atas-otp { font-size: 15px; margin-bottom: 15px; color: #333; }
        .kotak-nomor-otp {
            display: flex;
            align-items: center;
            background-color: #f1f1f1;
            border-radius: 8px;
            padding: 10px 12px;
            margin-bottom: 8px;
        }
        .via-wa { font-size: 13px; color: #666; margin-bottom: 5px; margin-left: 32px; display: flex; align-items: center; gap: 5px; }
        
        .peringatan-otp {
            font-size: 13px;
            color: #e74c3c;
            text-align: center;
            margin-bottom: 20px;
            font-weight: 500;
        }
        
        .kotak-otp-baris { display: flex; justify-content: center; gap: 15px; margin-bottom: 20px; }
        .kotak-otp {
            width: 45px; height: 50px;
            border: 1px solid #ccc;
            border-radius: 6px;
            text-align: center;
            font-size: 20px;
            outline: none;
        }
        .kotak-otp.aktif { border-color: #0086e6; }
        .nomor-tidak-aktif { text-align: center; font-size: 14px; color: #0086e6; margin-bottom: 25px; cursor: pointer; }
        .kotak-kirim-ulang { display: flex; align-items: center; justify-content: center; gap: 8px; }
        .tombol-kirim-ulang {
            background-color: #eee;
            border: none;
            padding: 8px 20px;
            border-radius: 6px;
            color: #999;
            font-size: 14px;
            cursor: not-allowed;
        }
        .timer-otp {
            background-color: #eee;
            width: 35px; height: 35px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            color: #666;
        }

        /* ✅ TOMBOL HALAMAN UTAMA DIPASTIKAN BISA DIPENCET */
        .tombol-utama {
            position: relative;
            z-index: 10;
            pointer-events: auto !important;
            cursor: pointer;
        }
    </style>
</head>
